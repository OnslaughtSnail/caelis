name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      # Keep the Go scheduler and subprocess fan-out conservative on
      # GitHub-hosted runners to avoid transient fork/exec failures.
      GOMAXPROCS: 2
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.1'
      - name: Build
        env:
          GOFLAGS: -p=1
        run: go build ./...
      - name: Vet
        env:
          GOFLAGS: -p=1
        run: go vet ./...
      - name: Test
        run: make test
