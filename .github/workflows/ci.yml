name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-test-eval-light:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.1'
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./...
      - name: Skip eval light when no model key is configured
        if: ${{ secrets.DEEPSEEK_API_KEY == '' && secrets.GEMINI_API_KEY == '' && secrets.GEMMIN_API_KEY == '' }}
        run: echo "No DEEPSEEK_API_KEY/GEMINI_API_KEY configured; skip eval light."
      - name: Eval light
        if: ${{ secrets.DEEPSEEK_API_KEY != '' || secrets.GEMINI_API_KEY != '' || secrets.GEMMIN_API_KEY != '' }}
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMMIN_API_KEY: ${{ secrets.GEMMIN_API_KEY }}
        run: go run ./eval/cmd -suite light -stream-modes on -thinking-modes on -thinking-budget 1024
