name: quality

on:
  push:
  pull_request:

jobs:
  go-quality:
    runs-on: ubuntu-latest
    env:
      GOFLAGS: -p=4
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify formatting
        run: make fmt-check

      - name: Lint
        uses: golangci/golangci-lint-action@v9.2.0
        with:
          version: v2.11.4
          args: ./...
          install-mode: goinstall

      - name: Vet
        run: make vet

      - name: Test
        run: make test

      - name: Build
        run: make build
