name: quality

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  go-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify formatting
        run: make fmt-check

      - name: Lint
        uses: golangci/golangci-lint-action@v9.2.0
        with:
          version: v2.11.4
          args: ./...
          install-mode: goinstall

      - name: Vet
        env:
          GOFLAGS: -p=1
          GOMAXPROCS: 2
        run: make vet

      - name: Build
        env:
          GOFLAGS: -p=1
          GOMAXPROCS: 2
        run: make build

      - name: Test
        env:
          # Package-level test fan-out still trips runner process limits on
          # GitHub-hosted Linux; keep the standard `go test ./...` path but
          # force a single package worker.
          GOFLAGS: -p=1
        run: make test
