name: nightly-eval

on:
  workflow_dispatch:

jobs:
  eval-nightly:
    runs-on: ubuntu-latest
    env:
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMMIN_API_KEY: ${{ secrets.GEMMIN_API_KEY }}
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.1'
      - name: Skip eval nightly when no model key is configured
        if: ${{ env.DEEPSEEK_API_KEY == '' && env.GEMINI_API_KEY == '' && env.GEMMIN_API_KEY == '' }}
        run: echo "No DEEPSEEK_API_KEY/GEMINI_API_KEY configured; skip eval nightly."
      - name: Eval nightly
        if: ${{ env.DEEPSEEK_API_KEY != '' || env.GEMINI_API_KEY != '' || env.GEMMIN_API_KEY != '' }}
        run: go run ./eval/cmd -suite nightly -stream-modes both -thinking-modes both -thinking-budget 1024
