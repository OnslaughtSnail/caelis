run:
  timeout: 5m
  tests: true

linters:
  disable-all: true
  enable:
    - bodyclose
    - contextcheck
    - errcheck
    - errorlint
    - gofmt
    - gocritic
    - govet
    - ineffassign
    - misspell
    - nilnil
    - revive
    - staticcheck
    - unconvert
    - unused

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    - path: ^kernel/session/catalog\.go$
      linters:
        - revive
      text: "SessionSummary|SessionCatalogStore"
    - path: ^kernel/session/session\.go$
      linters:
        - revive
      text: "SessionStateStore"
